<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="p" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffc0cb"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </radialGradient>
    <radialGradient id="c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
  </defs>
  <!-- 5 petals -->
  <g transform="translate(32,32)">
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#p)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#p)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#p)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#p)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#p)" transform="rotate(288)"/>
    <!-- center -->
    <circle cx="0" cy="0" r="5" fill="url(#c)"/>
    <!-- stamens -->
    <circle cx="0" cy="-3.5" r="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="3.3" cy="-1.1" r="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="2" cy="2.8" r="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="-2" cy="2.8" r="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="-3.3" cy="-1.1" r="1" fill="#f59e0b" opacity="0.8"/>
  </g>
</svg>
